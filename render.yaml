services:
  - type: web
    name: be-todo
    env: docker
    plan: free
    region: singapore
    dockerfilePath: ./assignment_1/todo-app/backend/Dockerfile
    envVars:
      - key: DB_HOST
        value: your-render-db-host
      - key: DB_USER
        value: your-render-db-user
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: your-render-db-name
      - key: DB_PORT
        value: 5432
      - key: PORT
        value: 5000

  - type: web
    name: fe-todo
    env: docker
    plan: free
    region: singapore
    dockerfilePath: ./assignment_1/todo-app/frontend/Dockerfile
    buildArgs:
      - key: REACT_APP_API_URL
        value: https://be-todo-xkgc.onrender.com
    envVars:
      - key: REACT_APP_API_URL
        value: https://be-todo-xkgc.onrender.com