name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./assignment_1/todo-app/backend
          push: true
          tags: ash5zero3/be-todo:02240334

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./assignment_1/todo-app/frontend
          push: true
          tags: ash5zero3/fe-todo:02240334
          build-args: |
            REACT_APP_API_URL=https://be-todo-ty9j.onrender.com

      - name: Trigger backend redeploy on Render
        run: curl ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}

      - name: Trigger frontend redeploy on Render
        run: curl ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}